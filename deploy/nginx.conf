# Nginx: serve frontend tĩnh (dist/) + proxy /api sang Phoenix (:4003).
# Cài đặt:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/food_street
#   (sửa server_name + root cho đúng)
#   sudo ln -s /etc/nginx/sites-available/food_street /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# Sau đó bật HTTPS:  sudo certbot --nginx -d ten-mien-cua-ban.com
server {
    listen 80;
    server_name ten-mien-cua-ban.com;

    root /opt/food_street/frontend/dist;
    index index.html;

    # Proxy API sang Phoenix release
    location /api/ {
        proxy_pass http://127.0.0.1:4003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # cần cho force_ssl của Phoenix
    }

    # SPA fallback cho React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}
